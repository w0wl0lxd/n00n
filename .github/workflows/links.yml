name: Links

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.md"
      - "**/*.html"
      - ".github/workflows/links.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.md"
      - "**/*.html"
      - ".github/workflows/links.yml"
  schedule:
    - cron: "47 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - uses: 'actions/checkout@11d5960a326750d5838078e36cf38b85af677262'  # v4
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: lychee
      - name: Link Checker
        run: |
          lychee \
            --no-progress \
            --max-concurrency 4 \
            --timeout 20 \
            --retry-wait-time 2 \
            --accept 200..=299,403,429 \
            --exclude-mail \
            "README.md" "CONTRIBUTING.md" "site/index.html" "site/docs/content/**/*.md"
        continue-on-error: true
