name: Security

on:
  push:
    branches: ["main"]
    paths:
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "deny.toml"
      - ".github/workflows/security.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "Cargo.lock"
      - "**/Cargo.toml"
      - "deny.toml"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "27 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rust-actions/cargo-audit@v1

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny --workspace check
        continue-on-error: true
