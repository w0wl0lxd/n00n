name: YAML

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.yml"
      - "**/*.yaml"
      - ".yamllint"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.yml"
      - "**/*.yaml"
      - ".yamllint"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yamllint
      - run: yamllint .
