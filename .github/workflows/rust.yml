name: Rust
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4.0.2
        id: filter
        with:
          filters: |
            code:
              - "Cargo.toml"
              - "Cargo.lock"
              - "src/**"
              - "n00n-*/src/**"
              - "n00n-*/benches/**"
              - "plugins/**"
              - "justfile"
              - "rust-toolchain.toml"
              - "clippy.toml"
              - "deny.toml"
              - "codecov.yml"
              - ".github/workflows/rust.yml"
  fmt:
    name: Format (Rust)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: cargo fmt --all -- --check
  fmt-lua:
    name: Format (Lua)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ github.token }}
          version: latest
          args: --check plugins/
  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - run: just lint
  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: just test
  machete:
    name: Unused deps
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete
  docs:
    name: Docs
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - run: just gen-docs-check
  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - run: just build
  lint-windows:
    name: Lint (Windows)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - run: just lint
  lint-macos:
    name: Lint (macOS)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - run: just lint
  build-windows:
    name: Build (Windows)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - run: just build
  test-macos:
    name: Test (macOS)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: just test
  test-windows:
    name: Test (Windows)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: just test
  ci-pass:
    name: CI
    if: always()
    needs: [fmt, fmt-lua, lint, test, machete, docs, build, lint-windows, lint-macos, build-windows, test-macos, test-windows]
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
