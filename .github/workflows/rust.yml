name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4.0.2
        id: filter
        with:
          filters: |
            code:
              - "Cargo.toml"
              - "Cargo.lock"
              - "src/**"
              - "n00n-*/src/**"
              - "n00n-*/benches/**"
              - "plugins/**"
              - "justfile"
              - "rust-toolchain.toml"
              - "clippy.toml"
              - "deny.toml"
              - "codecov.yml"
              - ".github/workflows/rust.yml"
              - ".github/workflows/security.yml"

  fmt:
    name: Format (Rust)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: cargo fmt --all -- --check

  fmt-lua:
    name: Format (Lua)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: stylua
      - run: stylua --check plugins/

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: just
      - run: just lint

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: just cargo:cargo-nextest
      - run: sudo apt-get -o Acquire::Retries=5 install -y ripgrep
      - run: just test

  machete:
    name: Unused deps
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: cargo:cargo-machete
      - run: cargo machete

  docs:
    name: Docs
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: just
      - run: just gen-docs-check

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: just
      - run: just build

  lint-windows:
    name: Lint (Windows)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: just
      - run: just lint

  build-windows:
    name: Build (Windows)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: just
      - run: just build

  coverage:
    name: Coverage
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: cargo:cargo-nextest cargo:cargo-llvm-cov
      - run: sudo apt-get -o Acquire::Retries=5 install -y ripgrep
      - run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info --retries 2
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  msrv:
    name: MSRV (1.97)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@1.97.0
      - run: cargo build --workspace --all-targets

  rustdoc:
    name: Rustdoc
    needs: changes
    if: needs.changes.outputs.code == 'true'
    env:
      RUSTDOCFLAGS: -D rustdoc::broken_intra_doc_links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  ci-pass:
    name: CI
    if: always()
    needs: [fmt, fmt-lua, lint, test, machete, docs, build, lint-windows, build-windows, coverage, msrv, rustdoc]
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
