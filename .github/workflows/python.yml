name: Python

on:
  push:
    branches: ["main"]
    paths:
      - "scripts/**/*.py"
      - ".github/workflows/python.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "scripts/**/*.py"
      - ".github/workflows/python.yml"

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: ruff
      - run: ruff check scripts/

  typecheck:
    name: ty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
        with:
          install_args: ty
      - run: ty check scripts/
