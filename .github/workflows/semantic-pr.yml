name: Semantic PR

on:
  pull_request_target:
    types: ["opened", "edited", "reopened", "synchronize"]

permissions:
  pull-requests: read

jobs:
  semantic:
    name: Validate title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        if: ${{ !contains(github.event.pull_request.title, '🤖') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: false
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
