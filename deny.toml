[advisories]
yanked = "warn"
ignore-source-required = false

[licenses]
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSD-3-Clause-Clear",
  "ISC",
  "Zlib",
  "0BSD",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Unlicense",
  "CC0-1.0",
  "CC-BY-4.0",
  "MPL-2.0",
  "BSL-1.0",
  "OpenSSL",
  "Artistic-2.0",
  "AGPL-3.0",
  "AGPL-3.0-only",
  "GPL-2.0-only",
  "GPL-3.0-only",
  "LGPL-2.1-only",
  "LGPL-3.0-only",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/pydantic/monty.git"]
