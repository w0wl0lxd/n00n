[files]
extend-exclude = [
  "site/_build/**",
  "site/asciinema-player.min.js",
  "Cargo.lock",
  "*.svg",
  "*.png",
  "*.ico",
  "flake.lock",
]

[default]
extend-ignore-re = [
  'n00n\.workflow\.hash\("abd"\)',
  'eq\(result, "ba"\)',
  '"caf\\xC3\\xA9!?"',
  '"caf\.\.\."',
  '"hel\\nlo"',
  '"summar",',
  '#\[test_case\("systm", None ; "typo_prompt"\)\]',
  'file\.write_all\(b"\{\\"t\\":\\"msg\\",\\"d\\":\{\\"trun"\)',
  'fromat = "bgra"',
  'splash_animaton = false',
]

[default.extend-identifiers]
inh = "inh"

[default.extend-words]
unparseable = "unparseable"
n00n = "n00n"
w0wl0lxd = "w0wl0lxd"
luau = "luau"
ratatui = "ratatui"
mlua = "mlua"
asciinema = "asciinema"
zola = "zola"
ndjson = "ndjson"
subagent = "subagent"
subagents = "subagents"
unmaintained = "unmaintained"
tree-sitter = "tree-sitter"
treesitter = "treesitter"
worktree = "worktree"
worktrees = "worktrees"
